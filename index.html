<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Borella Ayurveda Hospital — OPD Dispensary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Noto+Sans+Sinhala:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --bg:#FBF9F4;
    --surface:#FFFFFF;
    --ink:#24302B;
    --ink-soft:#5B665F;
    --green-deep:#1F4D3D;
    --green-deep-dark:#153A2D;
    --green-sage:#6B8F71;
    --green-mist:#E7EEE7;
    --ochre:#C68A2E;
    --ochre-soft:#F3E3C6;
    --muted:#9B9184;
    --terracotta:#B3452C;
    --terracotta-soft:#F5DFD6;
    --line:#E7E1D4;
    --radius:16px;
    --radius-sm:10px;
    --shadow:0 1px 2px rgba(31,77,61,0.06), 0 4px 16px rgba(31,77,61,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .si{font-family:'Noto Sans Sinhala','Inter',sans-serif;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:32px;}

  /* Header */
  .topbar{
    position:sticky;top:0;z-index:20;
    background:var(--green-deep);
    color:#fff;
    padding:14px 16px;
    display:flex;align-items:center;gap:10px;
    box-shadow:var(--shadow);
  }
  .topbar .back{
    background:rgba(255,255,255,0.12);border:none;color:#fff;
    width:36px;height:36px;border-radius:10px;font-size:18px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  }
  .topbar h1{
    font-family:'Fraunces',serif;font-weight:600;font-size:17px;
    margin:0;line-height:1.25;flex:1;letter-spacing:0.1px;
  }
  .topbar .sub{font-size:11px;color:var(--ochre-soft);font-weight:500;opacity:0.85;margin-top:1px;}
  .topbar .lang-btn{
    background:rgba(255,255,255,0.12);border:none;color:#fff;
    padding:7px 11px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;
  }

  .brand-header{
    padding:22px 20px 16px;
    display:flex;flex-direction:column;gap:2px;
  }
  .brand-eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;
    color:var(--green-sage);text-transform:uppercase;font-weight:500;
  }
  .brand-title{
    font-family:'Fraunces',serif;font-weight:600;font-size:26px;color:var(--green-deep-dark);
    line-height:1.15;
  }
  .brand-title .leaf{font-size:22px;margin-right:6px;}

  /* Availability ring */
  .stat-card.ring-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
  .pct-ring{
    width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  }
  .pct-ring-inner{
    width:36px;height:36px;border-radius:50%;background:var(--surface);
    display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;color:var(--green-deep-dark);
  }

  /* Status banner */
  .banner{
    margin:0 20px 18px;padding:12px 14px;border-radius:var(--radius-sm);
    display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.4;
  }
  .banner.warn{background:var(--terracotta-soft);color:#7A2E1B;border:1px solid #E3B8A4;}
  .banner.ok{background:var(--green-mist);color:var(--green-deep-dark);border:1px solid #CFE0D2;}
  .banner b{display:block;font-size:13px;margin-bottom:1px;}

  /* Home grid */
  .home-grid{padding:0 20px;display:flex;flex-direction:column;gap:10px;}
  .home-btn{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;
    box-shadow:var(--shadow);text-align:left;width:100%;
  }
  .home-btn .icon{
    width:44px;height:44px;border-radius:12px;background:var(--green-mist);
    display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
  }
  .home-btn.primary{background:var(--green-deep);border-color:var(--green-deep);}
  .home-btn.primary .icon{background:rgba(255,255,255,0.15);}
  .home-btn.primary .title{color:#fff;}
  .home-btn.primary .desc{color:var(--ochre-soft);}
  .home-btn .title{font-weight:600;font-size:15px;color:var(--ink);}
  .home-btn .desc{font-size:12px;color:var(--ink-soft);margin-top:1px;}
  .home-btn .arrow{margin-left:auto;color:var(--muted);font-size:16px;}
  .home-btn.primary .arrow{color:rgba(255,255,255,0.7);}

  .stats-row{display:flex;gap:10px;padding:0 20px 4px;}
  .stat-card{
    flex:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:12px;text-align:center;
  }
  .stat-card .num{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--green-deep-dark);}
  .stat-card.unavail .num{color:var(--terracotta);}
  .stat-card .lbl{font-size:11px;color:var(--ink-soft);margin-top:2px;}

  /* Search */
  .search-wrap{padding:14px 20px 6px;}
  .search-box{
    display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);
    border-radius:12px;padding:10px 14px;
  }
  .search-box input{border:none;outline:none;flex:1;font-size:14px;background:transparent;font-family:'Inter',sans-serif;color:var(--ink);}
  .search-box .clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;}

  /* Category */
  .category{margin:14px 20px 0;}
  .category-head{
    display:flex;align-items:center;gap:10px;padding:10px 4px;cursor:pointer;
    border-bottom:1px solid var(--line);
  }
  .category-head .cicon{font-size:18px;}
  .category-head .cname{font-weight:600;font-size:14.5px;color:var(--green-deep-dark);flex:1;}
  .category-head .cname .si-name{color:var(--ink-soft);font-weight:500;font-size:12.5px;margin-left:6px;}
  .category-head .ccount{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--green-sage);
    background:var(--green-mist);padding:2px 8px;border-radius:20px;
  }
  .category-head .chevron{color:var(--muted);font-size:12px;transition:transform 0.15s;}
  .category-head.collapsed .chevron{transform:rotate(-90deg);}
  .category-body{overflow:hidden;}
  .category-body.collapsed{display:none;}

  .med-row{
    display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid #F1EDE1;
  }
  .med-row:last-child{border-bottom:none;}
  .med-check{
    width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--surface);
  }
  .med-check.checked{background:var(--green-deep);border-color:var(--green-deep);color:#fff;font-size:14px;}
  .med-name{flex:1;font-size:14px;color:var(--ink);}
  .med-name .si-name{display:block;font-size:12px;color:var(--ink-soft);margin-top:1px;}
  .med-row.readonly{cursor:default;}
  .med-row.unavailable-hidden{display:none;}
  .avail-dot{width:8px;height:8px;border-radius:50%;background:var(--green-sage);flex-shrink:0;}

  .empty-state{padding:40px 20px;text-align:center;color:var(--ink-soft);}
  .empty-state .e-icon{font-size:34px;margin-bottom:8px;}
  .empty-state .e-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--green-deep-dark);margin-bottom:4px;}

  /* Footer meta bar (view/update screen) */
  .meta-bar{
    padding:10px 20px;display:flex;justify-content:space-between;align-items:center;
    font-size:11.5px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;
  }
  .meta-bar .saved{color:var(--green-sage);font-weight:500;}

  .action-bar{
    display:flex;gap:8px;padding:14px 20px 4px;flex-wrap:wrap;
  }
  .btn{
    border:none;border-radius:11px;padding:11px 16px;font-size:13px;font-weight:600;cursor:pointer;
    font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;
  }
  .btn-primary{background:var(--green-deep);color:#fff;flex:1;justify-content:center;}
  .btn-outline{background:var(--surface);color:var(--green-deep-dark);border:1px solid var(--line);}
  .btn-ghost{background:var(--green-mist);color:var(--green-deep-dark);}
  .btn-danger{background:var(--terracotta-soft);color:#7A2E1B;}
  .btn:active{opacity:0.8;}

  /* Admin */
  .admin-list-item{
    display:flex;align-items:center;gap:10px;padding:12px 4px;border-bottom:1px solid #F1EDE1;
  }
  .admin-list-item .a-info{flex:1;}
  .admin-list-item .a-name{font-size:14px;font-weight:500;}
  .admin-list-item .a-cat{font-size:11.5px;color:var(--ink-soft);}
  .icon-btn{background:none;border:none;color:var(--ink-soft);font-size:15px;cursor:pointer;padding:6px;}
  .icon-btn.del{color:var(--terracotta);}

  .form-block{padding:14px 20px;}
  .form-field{margin-bottom:12px;}
  .form-field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
  .form-field input, .form-field select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:14px;font-family:'Inter',sans-serif;background:var(--surface);color:var(--ink);
  }

  .history-item{
    display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid #F1EDE1;cursor:pointer;
  }
  .history-item .h-date{flex:1;}
  .history-item .h-day{font-weight:600;font-size:14px;}
  .history-item .h-count{font-size:12px;color:var(--ink-soft);}
  .history-item .h-arrow{color:var(--muted);}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--green-deep-dark);color:#fff;padding:10px 18px;border-radius:30px;
    font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,0.2);z-index:100;
    opacity:0;transition:opacity 0.2s;pointer-events:none;
  }
  .toast.show{opacity:1;}

  .section-label{
    padding:16px 20px 4px;font-family:'IBM Plex Mono',monospace;font-size:11px;
    letter-spacing:0.06em;text-transform:uppercase;color:var(--green-sage);font-weight:500;
  }
  ::selection{background:var(--ochre-soft);}

  button:focus-visible, input:focus-visible, select:focus-visible, [data-action]:focus-visible{
    outline:2.5px solid var(--ochre); outline-offset:2px; border-radius:8px;
  }
  .home-btn:active, .med-row:active, .icon-btn:active, .history-item:active{opacity:0.75;}
  .icon-btn{border-radius:8px;}
  .icon-btn:hover{background:var(--green-mist);}
  .icon-btn.del:hover{background:var(--terracotta-soft);}

  .export-card{
    margin:14px 20px 0;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;display:flex;gap:14px;box-shadow:var(--shadow);
  }
  .ec-icon{
    width:44px;height:44px;border-radius:12px;background:var(--terracotta-soft);color:var(--terracotta);
    display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;
  }
  .ec-icon.si{background:var(--green-mist);color:var(--green-deep);}
  .ec-body{flex:1;display:flex;flex-direction:column;gap:6px;}
  .ec-title{font-weight:600;font-size:14.5px;color:var(--ink);}
  .ec-desc{font-size:12.5px;color:var(--ink-soft);line-height:1.4;}
  .ec-body .btn{margin-top:4px;}
  .empty-state.search-empty{padding:36px 20px;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const CATEGORIES = [
  {key:'kwatha',  icon:'🌿', en:'Kwatha / Panta', si:'ක්වාත / පාන'},
  {key:'tablets', icon:'💊', en:'Guli / Tablet',  si:'ගුලි'},
  {key:'kalka',   icon:'🌱', en:'Kalka',          si:'කල්ක'},
  {key:'churna',  icon:'🌾', en:'Churna',         si:'චූර්ණ'},
  {key:'alepa',   icon:'🧴', en:'Alepa',          si:'ආලේප'},
  {key:'arishta', icon:'🍶', en:'Arishta / Asava',si:'අරිෂ්ට / ආසව'},
  {key:'oils',    icon:'🛢', en:'Oils',           si:'තෙල්'},
];

const DEFAULT_MEDICINES = [
  {id:'m1',  name_en:'Dashamula Kwatha',      name_si:'දශමූල ක්වාත',        category:'kwatha'},
  {id:'m2',  name_en:'Nirgundi Kwatha',       name_si:'නිර්ගුන්ධි ක්වාත',    category:'kwatha'},
  {id:'m3',  name_en:'Rasnadi Kwatha',        name_si:'රාස්නාදි ක්වාත',      category:'kwatha'},
  {id:'m4',  name_en:'Ashokarishta',          name_si:'අශෝකාරිෂ්ට',          category:'arishta'},
  {id:'m5',  name_en:'Dashamularishta',       name_si:'දශමූලාරිෂ්ට',         category:'arishta'},
  {id:'m6',  name_en:'Saraswatharishta',      name_si:'සරස්වතාරිෂ්ට',        category:'arishta'},
  {id:'m7',  name_en:'Ksheerabala Oil',       name_si:'ක්ෂීරබල තෙල්',        category:'oils'},
  {id:'m8',  name_en:'Chandanadi Oil',        name_si:'චන්දනාදි තෙල්',       category:'oils'},
  {id:'m9',  name_en:'Yogaraja Guggulu',      name_si:'යෝගරාජ ගුග්ගුලු',     category:'tablets'},
  {id:'m10', name_en:'Triphala Guli',         name_si:'ත්‍රිඵල ගුලි',         category:'tablets'},
  {id:'m11', name_en:'Priyangu Kalka',        name_si:'ප්‍රියංගු කල්ක',       category:'kalka'},
  {id:'m12', name_en:'Manjishta Kalka',       name_si:'මංජිෂ්ඨා කල්ක',       category:'kalka'},
  {id:'m13', name_en:'Triphala Churna',       name_si:'ත්‍රිඵල චූර්ණ',        category:'churna'},
  {id:'m14', name_en:'Sudarshana Churna',     name_si:'සුදර්ශන චූර්ණ',       category:'churna'},
  {id:'m15', name_en:'Kumkumadi Alepa',       name_si:'කුංකුමාදි ආලේප',      category:'alepa'},
  {id:'m16', name_en:'Nimba Alepa',           name_si:'නිම්බ ආලේප',          category:'alepa'},
];

const HOSPITAL_NAME = "Borella Ayurveda Hospital";

// ---------- State ----------
let state = {
  route: 'home',
  lang: 'en',             // en | si
  medicines: [],
  dailyDate: todayStr(),
  daily: {status:{}, updatedBy:null, updatedAt:null},
  collapsed: {},          // category collapse state
  search: '',
  historyDate: null,
  editingMed: null,       // medicine id being edited in admin, or 'new'
};
let saveTimer = null;

function todayStr(d){
  const dt = d ? new Date(d) : new Date();
  return dt.toISOString().slice(0,10);
}
function prettyDate(dstr){
  const d = new Date(dstr + 'T00:00:00');
  return d.toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
}
function prettyTime(iso){
  if(!iso) return '';
  return new Date(iso).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}
function uid(){ return 'm' + Math.random().toString(36).slice(2,9); }

// ---------- Storage helpers ----------
async function safeGet(key, shared){
  try{
    const r = await window.storage.get(key, shared);
    return r ? r.value : null;
  }catch(e){ return null; }
}
async function safeSet(key, value, shared){
  try{ await window.storage.set(key, value, shared); return true; }
  catch(e){ console.error('storage set failed', key, e); return false; }
}

async function loadMedicines(){
  let raw = await safeGet('medicines', true);
  if(!raw){
    await safeSet('medicines', JSON.stringify(DEFAULT_MEDICINES), true);
    state.medicines = DEFAULT_MEDICINES.slice();
  } else {
    try{ state.medicines = JSON.parse(raw); }catch(e){ state.medicines = DEFAULT_MEDICINES.slice(); }
  }
}
async function saveMedicines(){
  await safeSet('medicines', JSON.stringify(state.medicines), true);
}
async function loadDaily(date){
  let raw = await safeGet('daily:' + date, true);
  if(!raw){
    state.daily = {status:{}, updatedBy:null, updatedAt:null};
  } else {
    try{ state.daily = JSON.parse(raw); }catch(e){ state.daily = {status:{}, updatedBy:null, updatedAt:null}; }
  }
}
function queueSaveDaily(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    state.daily.updatedAt = new Date().toISOString();
    state.daily.updatedBy = 'Pharmacy Staff';
    await safeSet('daily:' + state.dailyDate, JSON.stringify(state.daily), true);
    render(); // refresh meta bar "saved" text
  }, 400);
}
async function loadPrefs(){
  let raw = await safeGet('prefs', false);
  if(raw){
    try{ const p = JSON.parse(raw); state.lang = p.lang || state.lang; }catch(e){}
  }
}
async function savePrefs(){
  await safeSet('prefs', JSON.stringify({lang:state.lang}), false);
}

// ---------- Toast ----------
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

// ---------- Navigation ----------
const PARENT_ROUTE = {
  list: 'home',
  export: 'home',
  history: 'home',
  historyDetail: 'history',
  admin: 'home',
  adminForm: 'admin',
};

function goto(route, extra){
  state.route = route;
  if(extra) Object.assign(state, extra);
  render();
}

function goBack(){
  const parent = PARENT_ROUTE[state.route] || 'home';
  if(parent === 'history') refreshHistory();
  goto(parent);
}

// ---------- Derived helpers ----------
function availableCount(){
  return Object.values(state.daily.status).filter(Boolean).length;
}
function unavailableCount(){
  return state.medicines.length - availableCount();
}
function medsForCategory(catKey, availableOnly){
  return state.medicines.filter(m=>{
    if(m.category !== catKey) return false;
    if(state.search){
      const s = state.search.toLowerCase();
      if(!m.name_en.toLowerCase().includes(s) && !m.name_si.includes(state.search)) return false;
    }
    if(availableOnly && !state.daily.status[m.id]) return false;
    return true;
  });
}
function medName(m){
  return state.lang === 'si'
    ? `<span class="si">${m.name_si}</span>`
    : `${m.name_en}`;
}
function medNameBoth(m){
  if(state.lang === 'si'){
    return `<span class="si">${m.name_si}</span><span class="si-name">${m.name_en}</span>`;
  }
  return `${m.name_en}<span class="si-name si">${m.name_si}</span>`;
}

// ---------- Render root ----------
function render(){
  const app = document.getElementById('app');
  app.innerHTML = renderRoute();
  bindEvents();
}

function renderRoute(){
  switch(state.route){
    case 'home': return renderHome();
    case 'list': return renderList();
    case 'export': return renderExport();
    case 'history': return renderHistory();
    case 'historyDetail': return renderHistoryDetail();
    case 'admin': return renderAdmin();
    case 'adminForm': return renderAdminForm();
    default: return renderHome();
  }
}

// ---------- Screens ----------
function renderTopbar(title, sub, showBack, rightAction){
  return `
  <div class="topbar">
    ${showBack ? `<button class="back" data-action="back">←</button>` : ''}
    <div>
      <h1>${title}</h1>
      ${sub ? `<div class="sub">${sub}</div>` : ''}
    </div>
    ${rightAction || ''}

async function refreshHistory(){
  try{
    const list = await window.storage.list('daily:', true);
    const keys = (list && list.keys) || [];
    const days = keys.map(k=>k.replace('daily:','')).sort().reverse().slice(0,7);
    const results = [];
    for(const date of days){
      const raw = await safeGet('daily:' + date, true);
      let d = {status:{}};
      try{ d = JSON.parse(raw); }catch(e){}
      results.push({date, count: Object.values(d.status||{}).filter(Boolean).length, updatedBy: d.updatedBy});
    }
    window.__historyDays = results;
  }catch(e){ window.__historyDays = []; }
  render();
}

  const totalLabel = isSi ? 'මුළු ලබාගත හැකි ප්‍රමාණය' : 'Total Available';
  const genLabel = isSi ? 'ජනනය කළේ' : 'Generated by';

  let body = '';
  if(rows.length === 0){
    body = `<div style="padding:40px 0;text-align:center;color:#9B9184;font-size:15px;">
      ${isSi ? 'අද දින කිසිදු ඖෂධයක් ලබාගත නොහැක' : 'No medicines marked available today'}
    </div>`;
  } else {
    rows.forEach(({cat, meds})=>{
      const label = isSi ? cat.si : cat.en;
      body += `
      <div style="margin-bottom:20px; break-inside:avoid;">
        <div style="display:flex;align-items:center;gap:8px;border-bottom:2px solid #E7EEE7;padding-bottom:7px;margin-bottom:9px;">
          <span style="font-size:19px;">${cat.icon}</span>

          <span style="margin-left:auto;font-size:12px;color:#1F4D3D;background:#E7EEE7;padding:3px 11px;border-radius:20px;font-weight:600;">${meds.length}</span>
        </div>

            <div style="display:flex;align-items:center;gap:10px;padding:6px 2px;font-size:14.5px;color:#24302B;">

async function generatePDF(date, daily, lang){
  toast('Preparing PDF…');
  const rows = buildReportRows(daily);
  const total = Object.values(daily.status).filter(Boolean).length;
  const dateLabel = prettyDate(date);

  const container = document.createElement('div');
  container.style.position = 'fixed';
  container.style.left = '-99999px';
  container.style.top = '0';
  container.style.zIndex = '-1';
  container.innerHTML = buildReportHTML(dateLabel, rows, lang, total);
  document.body.appendChild(container);

  // Give web fonts a moment to apply before rasterizing
  if(document.fonts && document.fonts.ready){ try{ await document.fonts.ready; }catch(e){} }
  await new Promise(r => setTimeout(r, 80));

  try{
    const canvas = await html2canvas(container.firstElementChild, {scale:2, backgroundColor:'#ffffff', useCORS:true});
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'pt', 'a4');
    const pageWidth = doc.internal.pageSize.getWidth();
    const pageHeight = doc.internal.pageSize.getHeight();
    const imgWidth = pageWidth;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    const imgData = canvas.toDataURL('image/png');

    let heightLeft = imgHeight;
    let position = 0;
    doc.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
    while(heightLeft > 0){
      position = heightLeft - imgHeight;
      doc.addPage();
      doc.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }
    doc.save(`OPD-medicines-${date}-${lang}.pdf`);
    toast('PDF downloaded');
  } catch(err){
    console.error('PDF generation failed', err);
    toast('PDF failed — try again');
  } finally {
    document.body.removeChild(container);
  }
}

function buildWhatsAppText(date, daily){
  let text = `*${HOSPITAL_NAME}*\nOPD Available Medicines — ${prettyDate(date)}\n\n`;
  const rows = buildReportRows(daily);
  rows.forEach(({cat, meds})=>{
    text += `${cat.icon} *${cat.en} / ${cat.si}*\n`;
    meds.forEach(m=> text += `• ${m.name_en} (${m.name_si})\n`);
    text += `\n`;
  });
  text += `Total available: ${Object.values(daily.status).filter(Boolean).length}`;
  return text;
}

function bindEvents(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', async (e)=>{
      const action = el.getAttribute('data-action');
      switch(action){
        case 'back': goBack(); break;
        case 'toggle-lang': state.lang = state.lang==='en'?'si':'en'; savePrefs(); render(); break;
        case 'goto': goto(el.getAttribute('data-route'), {mode: el.getAttribute('data-mode')}); if(el.getAttribute('data-route')==='history') refreshHistory(); break;
        case 'toggle-cat': {
          const c = el.getAttribute('data-cat');
          state.collapsed[c] = !state.collapsed[c];
          render();
          break;
        }
        case 'toggle': await handleToggle(el.getAttribute('data-id')); break;
        case 'clear-search': state.search=''; render(); break;
        case 'export-pdf-en': generatePDF(state.dailyDate, state.daily, 'en'); break;
        case 'export-pdf-si': generatePDF(state.dailyDate, state.daily, 'si'); break;
        case 'export-pdf-history-en': generatePDF(el.getAttribute('data-date'), window.__historyDetail, 'en'); break;
        case 'export-pdf-history-si': generatePDF(el.getAttribute('data-date'), window.__historyDetail, 'si'); break;
        case 'export-whatsapp': {
          const text = buildWhatsAppText(state.dailyDate, state.daily);
          window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
          break;
        }
        case 'select-all': {
          state.medicines.forEach(m => state.daily.status[m.id] = true);
          queueSaveDaily();
          render();
          break;
        }
        case 'clear-all': {
          if(confirm('Mark all medicines as not available?')){
            state.medicines.forEach(m => state.daily.status[m.id] = false);
            queueSaveDaily();
            render();
          }
          break;
        }
        case 'open-history': openHistoryDetail(el.getAttribute('data-date')); break;
        case 'new-med': goto('adminForm', {editingMed:'new', newMedCategory: null}); break;
        case 'new-med-cat': {
          e.stopPropagation();
          goto('adminForm', {editingMed:'new', newMedCategory: el.getAttribute('data-cat')});
          break;
        }
        case 'edit-med': goto('adminForm', {editingMed: el.getAttribute('data-id')}); break;
        case 'delete-med': {
          const id = el.getAttribute('data-id');
          if(confirm('Remove this medicine from the list?')){
            state.medicines = state.medicines.filter(m=>m.id!==id);
            await saveMedicines();
            toast('Medicine removed');
            render();
          }
          break;
        }
        case 'save-med': {
          const en = document.getElementById('f_en').value.trim();
          const si = document.getElementById('f_si').value.trim();
          const cat = document.getElementById('f_cat').value;
          if(!en){ toast('English name required'); return; }
          if(state.editingMed === 'new'){
            state.medicines.push({id: uid(), name_en:en, name_si:si, category:cat});
          } else {
            const m = state.medicines.find(x=>x.id===state.editingMed);
            m.name_en = en; m.name_si = si; m.category = cat;
          }
          await saveMedicines();
          toast('Saved');
          goto('admin');
          break;
        }
      }
    });
  });

  const searchInput = document.getElementById('searchInput');
  if(searchInput){
    searchInput.addEventListener('input', (e)=>{
      state.search = e.target.value;
      render();
      // restore focus + cursor after re-render
      const s = document.getElementById('searchInput');
      if(s){ s.focus(); s.selectionStart = s.selectionEnd = s.value.length; }
    });
  }
}

// ---------- Init ----------
async function init(){
  await loadPrefs();
  await loadMedicines();
  await loadDaily(state.dailyDate);
  render();
}
init();
</script>
</body>
</html>
